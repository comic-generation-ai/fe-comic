server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 127.0.0.11 là DNS nội bộ của Docker — bắt buộc khai resolver + dùng biến
    # $upstream trong proxy_pass (thay vì viết thẳng host) để nginx resolve
    # "be-comic" LẠI MỖI REQUEST thay vì chỉ 1 lần lúc khởi động. Viết thẳng
    # host tĩnh: nếu be-comic chưa có DNS đúng lúc nginx start (đã tái hiện
    # được lỗi này khi test ngoài mạng compose) thì nginx SẬP HẲN — kể cả phần
    # phục vụ file tĩnh không liên quan /api cũng chết theo.
    resolver 127.0.0.11 valid=10s;

    # Angular SPA: mọi route client-side không khớp file tĩnh đều fallback về
    # index.html để Angular Router tự xử lý — thiếu dòng này thì F5/deep-link
    # vào route con (vd /auth/login gõ thẳng URL) sẽ ra 404 từ nginx.
    #
    # CHÚ Ý: dùng "$uri/index.html" (serve thẳng), KHÔNG dùng "$uri/" (nginx tự
    # 301 redirect thêm "/" khi URI khớp tên thư mục) — prerender của Angular
    # xuất ra thư mục thật (vd auth/login/index.html), và nginx bên trong
    # container chỉ biết nó đang listen port 80, không biết Docker đang map ra
    # cổng 4200 — nên Location header của redirect thiếu cổng, trình duyệt
    # nhảy sang http://localhost/ (80, không có gì) thay vì giữ nguyên :4200.
    # Đã tái hiện & xác nhận đúng lỗi này qua test thật.
    location / {
        try_files $uri $uri/index.html /index.html;
    }

    # Dev (ng serve) đọc proxy.conf.json để forward /api sang be-comic:3000 —
    # nginx bản production không tự biết điều đó, phải khai lại tương đương ở
    # đây. Thiếu location này thì mọi gọi API từ FE (vd /api/auth/register) bị
    # chính nginx trả 404 vì cố tìm file tĩnh tên "api/auth/register".
    location /api/ {
        set $upstream be-comic:3000;
        # $upstream trong proxy_pass tắt luôn cơ chế tự nối path của nginx (chỉ
        # xảy ra khi target có biến) — phải tự ghép $request_uri (path gốc đầy
        # đủ, có query string) để backend nhận đúng "/api/auth/register" thay
        # vì chỉ nhận đúng chuỗi tĩnh "/api/" (đã tái hiện & xác nhận lỗi này
        # qua test thật: NestJS trả "Cannot POST /api/" bất kể gọi path nào).
        proxy_pass http://$upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
