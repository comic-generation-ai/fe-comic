<div class="modal-backdrop" (click)="cancel()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <!-- Modal Header -->
    <header class="modal-header">
      <h3 class="modal-title">{{ 'PROFILE.SECURITY' | translate }}</h3>
      <button class="btn-close-modal" (click)="cancel()" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon-close">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </header>

    <!-- Modal Content -->
    <div class="modal-content">
      <form class="modal-form" (ngSubmit)="$event.preventDefault()">
        <!-- New Password Field -->
        <div class="form-group">
          <label class="form-label">{{ 'PROFILE.NEW_PASSWORD' | translate }}</label>
          <input type="password" class="form-input" [(ngModel)]="newPassword" name="newPassword" placeholder="••••••••" />
        </div>

        <!-- Confirm Password Field -->
        <div class="form-group">
          <label class="form-label">{{ 'PROFILE.CONFIRM_PASSWORD' | translate }}</label>
          <input type="password" class="form-input" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="••••••••" />
        </div>

        <!-- Alert messages -->
        <div *ngIf="feedbackMessage" class="feedback-alert" [ngClass]="'alert-' + feedbackType">
          {{ feedbackMessage }}
        </div>
      </form>
    </div>

    <!-- Modal Footer Actions -->
    <footer class="modal-footer">
      <button type="button" class="btn-footer btn-cancel" (click)="cancel()">
        {{ 'PROFILE.EDIT_MODAL.CANCEL' | translate }}
      </button>
      <button type="button" class="btn-footer btn-save" (click)="save()">
        {{ 'PROFILE.UPDATE_PASSWORD' | translate }}
      </button>
    </footer>
  </div>
</div>
