<div class="sidebar-wrapper" [class.collapsed]="isCollapsed">
  <!-- Brand Logo -->
  <div class="sidebar-logo">
    <div class="logo-content">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M2 4.5h6a4 4 0 0 1 4 4v11a3 3 0 0 0-3-3H2V4.5Z"
          fill="url(#sidebar-logo-grad)" fill-opacity="0.14"
          stroke="url(#sidebar-logo-grad)" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" />
        <path
          d="M22 4.5h-6a4 4 0 0 0-4 4v11a3 3 0 0 1 3-3h7V4.5Z"
          fill="url(#sidebar-logo-grad)" fill-opacity="0.14"
          stroke="url(#sidebar-logo-grad)" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" />
        <defs>
          <linearGradient id="sidebar-logo-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#a855f7" />
            <stop offset="100%" stop-color="#3b82f6" />
          </linearGradient>
        </defs>
      </svg>
      <span class="logo-text">{{ 'LAYOUT.SIDEBAR.BRAND' | translate }}</span>
    </div>
  </div>

  <!-- Navigation Menu -->
  <nav class="sidebar-nav">
    <a routerLink="/app/comic-editor" routerLinkActive="active" class="nav-item"
      [title]="(isCollapsed ? ('LAYOUT.SIDEBAR.COMIC_EDITOR' | translate) : '')">
      <i class="pi material-symbols-outlined">palette</i>
      <span class="nav-text">{{ 'LAYOUT.SIDEBAR.COMIC_EDITOR' | translate }}</span>
    </a>
    <a routerLink="/app/story-board" routerLinkActive="active" class="nav-item"
      [title]="(isCollapsed ? ('LAYOUT.SIDEBAR.STORY_BOARD' | translate) : '')">
      <i class="pi material-symbols-outlined">grid_view</i>
      <span class="nav-text">{{ 'LAYOUT.SIDEBAR.STORY_BOARD' | translate }}</span>
    </a>
    <a routerLink="/app/profile" routerLinkActive="active" class="nav-item"
      [title]="(isCollapsed ? ('LAYOUT.SIDEBAR.PROFILE' | translate) : '')">
      <i class="pi material-symbols-outlined">account_circle</i>
      <span class="nav-text">{{ 'LAYOUT.SIDEBAR.PROFILE' | translate }}</span>
    </a>
  </nav>

  <!-- Sidebar Footer with Collapse Button at the bottom -->
  <div class="sidebar-footer">
    <button type="button" class="btn-toggle" (click)="toggle()" [title]="(isCollapsed ? 'Expand' : 'Collapse')">
      <i class="pi material-symbols-outlined">{{ isCollapsed ? 'chevron_right' : 'chevron_left' }}</i>
      <span class="toggle-text">{{ (isCollapsed ? 'Expand' : 'Collapse') }}</span>
    </button>
  </div>
</div>
